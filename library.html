<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veducation - Library</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=typography,line-clamp"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/custom.css">
    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" />
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style type="text/tailwindcss">
        /* Include base styles needed for library page */
        body {
            @apply min-h-screen bg-background font-sans text-lg text-neutral-600 pb-[6rem];
        }
        /* Add other base styles if needed */

        /* Styles for book grid - can use utilities or add here */
        /* .book-grid-item { @apply ...; } */
      </style>
</head>
<body class="bg-background text-neutral-600 font-sans">

    <!-- Header -->
    <header id="main-header" class="sticky top-0 z-20 bg-background p-2 flex justify-between items-center shadow-md">
        <!-- Header content will be injected by JS -->
        <p>Loading Header...</p>
    </header>

    <!-- Main Content Area -->
    <!-- The loadLibraryPageContent function in app.js will populate this -->
    <main id="main-content" class="container mx-auto py-6 px-container md:px-0">
        <h1 class="text-2xl font-bold mb-6">My Library</h1>

        <section id="featured-book-section" class="mb-8">
             <!-- Featured Book component/HTML -->
             <p>Loading Featured Book...</p>
        </section>

        <section id="your-books-section" class="mb-8">
            <h2 class="text-xl font-semibold mb-4">Your Purchased Books</h2>
            <div id="your-books-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
                <!-- Purchased books grid will be rendered here -->
                 <p class="col-span-full text-center p-5">Loading your books...</p>
            </div>
        </section>

        <section id="discover-books-section">
             <h2 class="text-xl font-semibold mb-4">Discover More Books</h2>
             <div id="discover-books-list">
                <!-- List or carousel of other books -->
                 <p class="text-center p-5">Loading recommendations...</p>
            </div>
        </section>

    </main>

    <!-- Footer / Navbar -->
    <nav id="main-navbar" class="fixed bottom-0 left-0 w-full bg-background shadow-inner z-10 border-t border-gray-200">
        <!-- Navbar content will be injected by JS -->
         <p class="text-center text-xs p-2">Loading Navigation...</p>
    </nav>

    <!-- Core JavaScript -->
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <!-- Potentially a library-specific script if complex -->
    <!-- <script src="js/library.js"></script> -->

</body>
</html>
