<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veducation - Profile</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=typography,line-clamp"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/custom.css">
    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" />
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style type="text/tailwindcss">
        /* Include base styles needed for profile page */
        body {
            @apply min-h-screen bg-background font-sans text-lg text-neutral-600 pb-[6rem];
        }
        /* Add other base styles if needed */
      </style>
</head>
<body class="bg-background text-neutral-600 font-sans">

    <!-- Header -->
    <header id="main-header" class="sticky top-0 z-20 bg-background p-2 flex justify-between items-center shadow-md">
        <!-- Header content will be injected by JS -->
        <p>Loading Header...</p>
    </header>

    <!-- Main Content Area -->
    <!-- The loadProfilePageContent function in app.js will populate this -->
    <main id="main-content" class="container mx-auto py-6 px-container md:px-0">
        <h1 class="text-2xl font-bold mb-6">Your Profile</h1>

        <div id="profile-content-area">
            <!-- Profile details or login prompt will be rendered here -->
            <p class="text-center p-10">Loading profile...</p>
        </div>

        <section id="order-history-section" class="mt-8 pt-6 border-t">
             <h2 class="text-xl font-semibold mb-4">Order History</h2>
             <div id="orders-list">
                 <!-- Order history will be rendered here -->
                  <p class="text-center p-5">Loading order history...</p>
             </div>
        </section>

        <!-- Could add links to edit profile, manage settings etc. -->

    </main>

    <!-- Footer / Navbar -->
    <nav id="main-navbar" class="fixed bottom-0 left-0 w-full bg-background shadow-inner z-10 border-t border-gray-200">
        <!-- Navbar content will be injected by JS -->
         <p class="text-center text-xs p-2">Loading Navigation...</p>
    </nav>

    <!-- Core JavaScript -->
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <!-- Potentially a profile-specific script -->
    <!-- <script src="js/profile.js"></script> -->

</body>
</html>
