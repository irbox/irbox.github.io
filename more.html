<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veducation - More</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=typography,line-clamp"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/custom.css">
    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" />
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style type="text/tailwindcss">
        /* Include base styles needed for more page */
        body {
            @apply min-h-screen bg-background font-sans text-lg text-neutral-600 pb-[6rem];
        }
        /* Add other base styles if needed */

        /* Styles for list items */
        .more-link-item {
            @apply flex items-center justify-between p-4 border-b border-gray-200 hover:bg-gray-100 transition-colors duration-200;
        }
        .more-link-item i.fa-chevron-right {
            @apply text-gray-400;
        }
        .more-link-item .item-icon {
            @apply mr-3 text-primary w-5 text-center; /* Icon styling */
        }
         .more-link-item .item-text {
            @apply text-neutral-700 font-medium;
        }
      </style>
</head>
<body class="bg-background text-neutral-600 font-sans">

    <!-- Header -->
    <header id="main-header" class="sticky top-0 z-20 bg-background p-2 flex justify-between items-center shadow-md">
        <!-- Header content will be injected by JS -->
        <p>Loading Header...</p>
    </header>

    <!-- Main Content Area -->
    <!-- The loadMorePageContent function in app.js will populate this -->
    <main id="main-content" class="container mx-auto py-6 px-container md:px-0">
        <h1 class="text-2xl font-bold mb-6">More Options</h1>

        <div id="more-options-list" class="bg-white rounded-lg shadow overflow-hidden border border-gray-200">
            <!-- List of links will be rendered here -->
            <p class="text-center p-10">Loading options...</p>
        </div>

    </main>

    <!-- Footer / Navbar -->
    <nav id="main-navbar" class="fixed bottom-0 left-0 w-full bg-background shadow-inner z-10 border-t border-gray-200">
        <!-- Navbar content will be injected by JS -->
         <p class="text-center text-xs p-2">Loading Navigation...</p>
    </nav>

    <!-- Core JavaScript -->
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <!-- Potentially a more-specific script -->
    <!-- <script src="js/more.js"></script> -->

</body>
</html>
