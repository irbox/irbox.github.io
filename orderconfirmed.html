<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veducation - Order Confirmed</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=typography,line-clamp,forms"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/custom.css">
    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" />
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style type="text/tailwindcss">
        /* Include base styles needed for order confirmed page */
        body {
            @apply min-h-screen bg-background font-sans text-lg text-neutral-600 pb-[6rem];
        }
        /* Add other base styles if needed */

        /* Styles derived from original OrderConfirm/OrderSuccess components */
        .order-success-box {
             @apply border-2 py-5 px-6 rounded-md border-[#F5D9B1] bg-[#FCE9CF] mb-8 text-center md:text-left;
        }
        .order-success-box p:first-child {
             @apply text-[#5C5C5C] text-lg mb-1; /* Thank you! */
        }
         .order-success-box span.title {
             @apply block text-[#455441] text-2xl md:text-3xl font-bold leading-tight mb-2; /* Your order has been received */
        }
         .order-success-box p.arrival-info {
             @apply text-[#455441] text-base leading-normal; /* Arriving by : */
        }
         .order-success-box span.arrival-date {
            @apply text-[#4CA137] text-base font-bold; /* Date */
        }

        /* Styles for order details section */
         .order-details-section {
            @apply bg-white p-6 rounded-lg shadow border border-gray-200 mb-8;
        }
        .order-details-heading {
            @apply text-xl font-bold mb-4 pb-2 border-b border-gray-200;
        }
        .order-details-item {
             @apply flex justify-between py-2 border-b border-gray-100 last:border-b-0;
        }
        .order-details-label {
            @apply text-neutral-600 font-medium;
        }
        .order-details-value {
             @apply text-neutral-800 font-semibold text-right;
        }
        .purchased-item {
             @apply flex items-center gap-4 py-3 border-b border-gray-100 last:border-b-0;
        }
         .purchased-item img {
            @apply w-16 h-16 object-contain border rounded p-1 bg-gray-50;
         }
         .purchased-item .item-info {
             @apply flex-grow;
         }
         .purchased-item .item-title {
             @apply font-semibold text-neutral-800 text-base line-clamp-2;
         }
         .purchased-item .item-qty-price {
            @apply text-sm text-neutral-500;
         }

      </style>
</head>
<body class="bg-background text-neutral-600 font-sans">

    <!-- Header -->
    <header id="main-header" class="sticky top-0 z-20 bg-background p-2 flex justify-between items-center shadow-md">
        <!-- Header content will be injected by JS -->
        <p>Loading Header...</p>
    </header>

    <!-- Main Content Area -->
    <!-- The loadOrderConfirmedPageContent function in app.js will populate this -->
    <main id="main-content" class="container mx-auto py-6 px-container md:px-0">

        <!-- Success Message Box -->
        <div id="order-success-message" class="order-success-box">
            <!-- Content generated by JS -->
            <p>Loading Confirmation...</p>
        </div>

        <!-- Order Details -->
        <div id="order-details-summary" class="order-details-section">
             <h2 class="order-details-heading">Order Details</h2>
             <div id="order-details-content">
                 <!-- Order details like ID, Date, Total will be rendered here -->
                 <p>Loading details...</p>
            </div>
        </div>

         <!-- Purchased Items List -->
        <div id="purchased-items-list" class="order-details-section">
             <h2 class="order-details-heading">Items Ordered</h2>
             <div id="purchased-items-content">
                 <!-- List of purchased items rendered here -->
                 <p>Loading items...</p>
            </div>
        </div>

        <!-- Shipping Address -->
        <div id="shipping-address-details" class="order-details-section">
             <h2 class="order-details-heading">Shipping Address</h2>
            <div id="shipping-address-content">
                <!-- Shipping address rendered here -->
                 <p>Loading address...</p>
            </div>
        </div>

        <div class="mt-8 text-center">
             <a href="/orders.html" class="inline-block bg-secondary text-white font-bold py-2 px-6 rounded hover:bg-secondary-dark transition duration-300">
                 View Order History
             </a>
             <a href="/" class="inline-block ml-4 text-primary hover:underline">
                 Continue Shopping
             </a>
        </div>

    </main>

    <!-- Footer / Navbar -->
    <nav id="main-navbar" class="fixed bottom-0 left-0 w-full bg-background shadow-inner z-10 border-t border-gray-200">
        <!-- Navbar content will be injected by JS -->
         <p class="text-center text-xs p-2">Loading Navigation...</p>
    </nav>

    <!-- Core JavaScript -->
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <!-- Order Confirmation specific script -->
    <script src="js/orderconfirmed.js"></script>

</body>
</html>
