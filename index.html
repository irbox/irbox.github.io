<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WASM Video Merger</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
            color: #333;
        }
        .container {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        input[type="file"], button {
            display: block;
            margin: 10px auto;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ddd;
        }
        button {
            background-color: #3498db;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        #status, #logOutput {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #eee;
            background-color: #ecf0f1;
            border-radius: 5px;
            white-space: pre-wrap; /* For log output */
            word-wrap: break-word;
        }
        #selectedFilesList {
            list-style-type: none;
            padding: 0;
        }
        #selectedFilesList li {
            background-color: #f9f9f9;
            border: 1px dashed #ccc;
            padding: 5px;
            margin-bottom: 5px;
            border-radius: 3px;
        }
        #outputVideo {
            display: block;
            margin: 20px auto;
            max-width: 100%;
            border: 1px solid #ccc;
        }
    </style>
    <!-- Load FFmpeg.wasm -->
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.0/dist/ffmpeg.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Video Merger (WASM)</h1>
        <p style="text-align: center; font-size: 0.9em; color: #7f8c8d;">
            Select multiple video files (ideally with the same codecs/resolution) to merge.
            Merging happens entirely in your browser.
        </p>

        <input type="file" id="fileInput" multiple accept="video/*">

        <div id="selectedFilesInfo">
            <h4>Selected Files:</h4>
            <ul id="selectedFilesList"></ul>
        </div>

        <button id="mergeButton" disabled>Merge Videos</button>

        <div id="status">Status: Waiting for files...</div>
        <pre id="logOutput"></pre>

        <div id="outputContainer" style="text-align: center;">
            <video id="outputVideo" controls style="display:none;"></video>
            <a id="downloadLink" style="display:none;">Download Merged Video</a>
        </div>
    </div>

    <script>
        const { createFFmpeg, fetchFile } = FFmpeg; // Destructure from window.FFmpeg
        let ffmpeg;
        let selectedFiles = [];

        const fileInput = document.getElementById('fileInput');
        const mergeButton = document.getElementById('mergeButton');
        const statusDiv = document.getElementById('status');
        const logOutput = document.getElementById('logOutput');
        const outputVideo = document.getElementById('outputVideo');
        const downloadLink = document.getElementById('downloadLink');
        const selectedFilesList = document.getElementById('selectedFilesList');

        async function loadFFmpeg() {
            if (!ffmpeg || !ffmpeg.isLoaded()) {
                statusDiv.textContent = 'Loading FFmpeg-core.js... This might take a moment.';
                logOutput.textContent = ''; // Clear previous logs
                ffmpeg = createFFmpeg({
                    // corePath: 'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js', // FFmpeg v0.11
                    // For FFmpeg v0.12+ you might need different core paths for MT/non-MT versions
                    // For simplicity, assuming v0.11 or that createFFmpeg handles corePath if not specified for some versions
                    // Check the specific FFmpeg.wasm version documentation for corePath requirements
                    log: true, // Enable logging to console
                    logger: ({ message }) => { // Custom logger to display in HTML
                        logOutput.textContent += message + '\n';
                        logOutput.scrollTop = logOutput.scrollHeight; // Scroll to bottom
                    },
                    progress: (p) => {
                        statusDiv.textContent = `Processing: ${Math.round(p.ratio * 100)}%`;
                    }
                });
                await ffmpeg.load();
                statusDiv.textContent = 'FFmpeg loaded successfully!';
            }
        }

        fileInput.addEventListener('change', (event) => {
            selectedFiles = Array.from(event.target.files);
            selectedFilesList.innerHTML = ''; // Clear previous list
            outputVideo.style.display = 'none';
            downloadLink.style.display = 'none';

            if (selectedFiles.length > 1) {
                mergeButton.disabled = false;
                statusDiv.textContent = `${selectedFiles.length} files selected. Ready to merge.`;
                selectedFiles.forEach(file => {
                    const listItem = document.createElement('li');
                    listItem.textContent = `${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`;
                    selectedFilesList.appendChild(listItem);
                });
            } else {
                mergeButton.disabled = true;
                statusDiv.textContent = 'Please select at least two video files.';
            }
        });

        mergeButton.addEventListener('click', async () => {
            if (selectedFiles.length < 2) {
                alert('Please select at least two video files to merge.');
                return;
            }

            mergeButton.disabled = true;
            outputVideo.style.display = 'none';
            downloadLink.style.display = 'none';
            logOutput.textContent = ''; // Clear logs
            statusDiv.textContent = 'Initializing...';

            try {
                await loadFFmpeg(); // Ensure FFmpeg is loaded

                statusDiv.textContent = 'Writing files to FFmpeg virtual file system...';
                const fileNames = [];
                let fileListContent = "";

                for (let i = 0; i < selectedFiles.length; i++) {
                    const file = selectedFiles[i];
                    // Sanitize file names for FFmpeg if necessary, though modern browsers handle most chars well
                    const safeName = `input${i}.${file.name.split('.').pop() || 'mp4'}`;
                    fileNames.push(safeName);
                    ffmpeg.FS('writeFile', safeName, await fetchFile(file));
                    fileListContent += `file '${safeName}'\n`;
                }

                ffmpeg.FS('writeFile', 'filelist.txt', fileListContent);
                statusDiv.textContent = 'Files written. Starting merge process...';
                logOutput.textContent += '--- FFmpeg Command Arguments ---\n';
                logOutput.textContent += `ffmpeg -f concat -safe 0 -i filelist.txt -c copy output.mp4\n`;
                logOutput.textContent += '-------------------------------\n';


                // FFmpeg command to concatenate videos
                // -f concat: Use the concat demuxer
                // -safe 0: Required for concat demuxer with relative paths in filelist.txt
                // -i filelist.txt: Input file list
                // -c copy: Stream copy (no re-encoding). This is fast but requires compatible codecs.
                // output.mp4: Output file name
                await ffmpeg.run('-f', 'concat', '-safe', '0', '-i', 'filelist.txt', '-c', 'copy', 'output.mp4');

                statusDiv.textContent = 'Merge complete! Reading output file...';
                const data = ffmpeg.FS('readFile', 'output.mp4');

                // Create a URL for the output video
                const videoBlob = new Blob([data.buffer], { type: 'video/mp4' }); // Assuming MP4 output
                const videoUrl = URL.createObjectURL(videoBlob);

                outputVideo.src = videoUrl;
                outputVideo.style.display = 'block';

                downloadLink.href = videoUrl;
                downloadLink.download = 'merged_video.mp4';
                downloadLink.textContent = 'Download Merged Video';
                downloadLink.style.display = 'inline-block';

                statusDiv.textContent = 'Merged video ready for preview and download!';

                // Cleanup virtual file system (optional, new ffmpeg instance on next run will clear it)
                fileNames.forEach(name => ffmpeg.FS('unlink', name));
                ffmpeg.FS('unlink', 'filelist.txt');
                ffmpeg.FS('unlink', 'output.mp4');

            } catch (error) {
                statusDiv.textContent = `Error: ${error.message || error}`;
                logOutput.textContent += `\nERROR: ${error.message || error}\n${error.stack || ''}\n`;
                console.error(error);
            } finally {
                mergeButton.disabled = false;
                if (selectedFiles.length < 2) mergeButton.disabled = true;
            }
        });

        // Initial load attempt (optional, can be deferred to button click)
        // loadFFmpeg().catch(err => {
        //    statusDiv.textContent = "Failed to pre-load FFmpeg. It will load on first merge attempt.";
        //    console.error("FFmpeg pre-load failed:", err);
        // });

    </script>
</body>
</html>
