<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details</title> <!-- Title will be updated by JS -->
    <link rel="stylesheet" href="style.css">
     <style>
        .product-detail-container {
            padding: 1rem;
        }
        .product-image-container {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .product-image {
            max-width: 250px;
            height: auto;
            border-radius: 8px;
        }
        .product-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
        .product-author {
            color: #555;
            margin-bottom: 1rem;
        }
        .product-price {
            font-size: 1.25rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }
        .product-description {
            line-height: 1.6;
            color: #333;
            margin-bottom: 1.5rem;
        }
        .product-actions {
            display: flex;
            gap: 1rem;
            flex-direction: column;
             align-items: center;
        }
        @media (min-width: 768px) {
            .product-actions {
                 flex-direction: row;
            }
        }
    </style>
</head>
<body>
    <header class="header" id="main-header">
        <!-- Header content will be loaded by JS -->
    </header>

    <main class="container product-detail-container" id="product-detail">
        <!-- Product details will be loaded here -->
        <p>Loading product details...</p>
    </main>

    <nav class="navbar" id="main-navbar">
        <!-- Navbar will be loaded by JS -->
    </nav>

    <script src="auth.js"></script>
    <script src="cart.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadHeader();
            loadNavbar(''); // Or determine active based on category
            loadProductDetails();
            updateCartCount();
        });
    </script>
</body>
</html>
