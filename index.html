<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WASM Video Merger</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
            color: #333;
        }
        .container {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        input[type="file"], button {
            margin-top: 10px;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #ddd;
        }
        button {
            background-color: #007bff;
            color: white;
            cursor: pointer;
        }
        button:disabled {
            background-color: #ccc;
        }
        #status, #log {
            margin-top: 15px;
            padding: 10px;
            background-color: #e9ecef;
            border-radius: 4px;
            white-space: pre-wrap; /* Keep newlines in log */
            max-height: 200px;
            overflow-y: auto;
        }
        video {
            max-width: 100%;
            margin-top: 15px;
            border: 1px solid #ddd;
        }
        a {
            color: #007bff;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Video Merger (WASM)</h1>
        <p>Select two or more video files (MP4 recommended, with similar codecs/resolutions for best results) to merge.</p>

        <input type="file" id="fileInput" multiple accept="video/mp4,video/*">
        <button id="mergeButton">Merge Videos</button>

        <div id="status">Status: Idle</div>
        <div id="log-container" style="display:none;">
            <h3>FFmpeg Log:</h3>
            <pre id="log"></pre>
        </div>

        <div id="outputArea" style="display:none;">
            <h3>Merged Video:</h3>
            <video id="outputVideo" controls></video>
            <br>
            <a id="downloadLink" href="#" download="merged_video.mp4">Download Merged Video</a>
        </div>
    </div>

    <!-- IMPORTANT: Load ffmpeg.wasm. This uses a CDN. -->
    <!-- For a truly self-contained app without external fetches, -->
    <!-- you'd need to serve these files yourself and handle COOP/COEP headers -->
    <!-- if you want to use the multi-threaded version. -->
    <!-- We use the single-threaded version here (ffmpeg-core.js) for broader compatibility -->
    <!-- when serving from simple static hosts or file:// -->
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.0/dist/ffmpeg.min.js"></script>

    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        let ffmpeg; // Keep ffmpeg instance

        const fileInput = document.getElementById('fileInput');
        const mergeButton = document.getElementById('mergeButton');
        const statusDiv = document.getElementById('status');
        const logDiv = document.getElementById('log');
        const logContainer = document.getElementById('log-container');
        const outputArea = document.getElementById('outputArea');
        const outputVideo = document.getElementById('outputVideo');
        const downloadLink = document.getElementById('downloadLink');

        let isFFmpegLoaded = false;

        async function loadFFmpeg() {
            if (isFFmpegLoaded && ffmpeg) return ffmpeg;
            statusDiv.textContent = 'Loading FFmpeg-core... (this may take a moment)';
            logContainer.style.display = 'block';
            logDiv.textContent = ''; // Clear previous logs

            try {
                ffmpeg = createFFmpeg({
                    // corePath: 'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js', // Single-threaded
                    // For multi-threaded, you'd use ffmpeg-core-mt.js and need COOP/COEP headers
                    // corePath: 'https://unpkg.com/@ffmpeg/core-mt@0.11.0/dist/ffmpeg-core-mt.js',
                    // wasmPath: 'https://unpkg.com/@ffmpeg/core-mt@0.11.0/dist/ffmpeg-core.wasm',
                    // workerPath: 'https://unpkg.com/@ffmpeg/core-mt@0.11.0/dist/ffmpeg-core-worker.js',
                    log: true, // Enable logging from FFmpeg
                });

                ffmpeg.setLogger(({ type, message }) => {
                    logDiv.textContent += `[${type}] ${message}\n`;
                    logDiv.scrollTop = logDiv.scrollHeight; // Auto-scroll
                });

                ffmpeg.setProgress(({ ratio }) => {
                    statusDiv.textContent = `Processing... ${(ratio * 100).toFixed(2)}%`;
                     if (ratio === 1) {
                        statusDiv.textContent = "Processing complete. Finalizing...";
                    }
                });

                await ffmpeg.load();
                isFFmpegLoaded = true;
                statusDiv.textContent = 'FFmpeg loaded. Ready to merge.';
                return ffmpeg;
            } catch (error) {
                statusDiv.textContent = 'Error loading FFmpeg: ' + error.message;
                logDiv.textContent += 'Error loading FFmpeg: ' + error.stack + '\n';
                console.error("FFmpeg load error:", error);
                isFFmpegLoaded = false;
                throw error; // Re-throw to stop processing
            }
        }

        mergeButton.addEventListener('click', async () => {
            const files = fileInput.files;
            if (files.length < 2) {
                alert('Please select at least two video files.');
                return;
            }

            mergeButton.disabled = true;
            outputArea.style.display = 'none';
            logContainer.style.display = 'block';
            logDiv.textContent = ''; // Clear previous logs

            try {
                await loadFFmpeg(); // Ensure FFmpeg is loaded

                statusDiv.textContent = 'Preparing files...';
                const inputPaths = [];
                let fileListContent = "";

                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    // Sanitize filename for FFmpeg's virtual filesystem
                    const safeName = `input${i}.${file.name.split('.').pop() || 'mp4'}`;
                    inputPaths.push(safeName);
                    fileListContent += `file '${safeName}'\n`;
                    statusDiv.textContent = `Loading ${file.name} to memory...`;
                    ffmpeg.FS('writeFile', safeName, await fetchFile(file));
                    logDiv.textContent += `Wrote ${file.name} as ${safeName} to virtual FS.\n`;
                }

                ffmpeg.FS('writeFile', 'mylist.txt', fileListContent);
                logDiv.textContent += 'Created mylist.txt for concatenation.\n';

                statusDiv.textContent = 'Starting merge process...';
                logDiv.textContent += 'Executing FFmpeg command...\n';

                // FFmpeg command for concatenation
                // -f concat: uses the concat demuxer
                // -safe 0: allows unsafe file paths (not strictly needed here as we control names)
                // -i mylist.txt: input file list
                // -c copy: copies streams without re-encoding (FAST, but requires compatible codecs)
                // output.mp4: the output file name
                await ffmpeg.run('-f', 'concat', '-safe', '0', '-i', 'mylist.txt', '-c', 'copy', 'output.mp4');

                statusDiv.textContent = 'Merge complete! Reading output file...';
                const data = ffmpeg.FS('readFile', 'output.mp4');

                // Clean up files from virtual FS
                inputPaths.forEach(path => ffmpeg.FS('unlink', path));
                ffmpeg.FS('unlink', 'mylist.txt');
                ffmpeg.FS('unlink', 'output.mp4'); // Not strictly necessary before exit, but good practice

                const videoBlob = new Blob([data.buffer], { type: 'video/mp4' });
                const videoUrl = URL.createObjectURL(videoBlob);

                outputVideo.src = videoUrl;
                downloadLink.href = videoUrl;
                outputArea.style.display = 'block';
                statusDiv.textContent = 'Merge successful! Output ready.';

            } catch (error) {
                statusDiv.textContent = 'Error during merge: ' + error.message;
                logDiv.textContent += 'Error: ' + error.stack + '\n';
                console.error("Merge error:", error);
            } finally {
                mergeButton.disabled = false;
            }
        });

        // Pre-load FFmpeg on page load for better UX, but can be deferred to button click
        // loadFFmpeg().catch(err => console.warn("Pre-loading FFmpeg failed, will try on demand."));

    </script>
</body>
</html>
