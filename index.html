<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veducation - Home</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=typography,line-clamp"></script>
    <!-- Custom CSS (if needed later) -->
    <link rel="stylesheet" href="css/custom.css">
    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" />
    <!-- Font Awesome for icons (example, replace if needed) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style type="text/tailwindcss">
        /* Include base styles from globals.css that aren't utilities */
        /* (Example: You might need to manually add font definitions or specific body styles here if not covered by Tailwind base) */
        body {
            @apply min-h-screen bg-background font-sans text-lg text-neutral-600 pb-[6rem]; /* From globals.css */
        }
        h1 {
            @apply mb-2 font-sans text-5xl font-semibold text-neutral-800 sm:text-7xl md:text-8xl lg:text-9xl; /* From globals.css */
          }
          /* Add other base styles (h2-h6, p, a, etc.) from globals.css if needed */
          /* ... */

        /* Add styles converted from .module.css files if not using utility classes directly */
        /* Example: .cardRoot { @apply grid; grid-template-columns: 1fr; } */
      </style>

</head>
<body class="bg-background text-neutral-600 font-sans">

    <!-- Header -->
    <header id="main-header" class="sticky top-0 z-20 bg-background p-2 flex justify-between items-center shadow-md">
        <!-- Header content will be injected by JS -->
    </header>

    <!-- Main Content Area -->
    <main id="main-content" class="container mx-auto px-4 py-6">
        <!-- Homepage content will be dynamically loaded here -->
        <!-- Example structure based on typical Next.js page -->
        <section id="home-banner" class="mb-8">
            <!-- Banner content -->
            <p>Loading Banner...</p>
        </section>
        <section id="about-section" class="mb-8">
             <!-- About section content -->
             <p>Loading About Section...</p>
        </section>
        <section id="product-list-1" class="mb-8">
            <!-- Product list content (e.g., Books) -->
             <p>Loading Products...</p>
        </section>
         <section id="product-list-2" class="mb-8">
            <!-- Product list content (e.g., Yoddha Store) -->
             <p>Loading Products...</p>
        </section>
         <section id="courses-section" class="mb-8">
            <!-- Courses list content -->
             <p>Loading Courses...</p>
        </section>
         <section id="donations-section" class="mb-8">
            <!-- Donations section content -->
             <p>Loading Donations...</p>
        </section>
        <!-- Add more sections as needed based on original page structure -->
    </main>

    <!-- Footer / Navbar -->
    <nav id="main-navbar" class="fixed bottom-0 left-0 w-full bg-background shadow-inner z-10 border-t border-gray-200">
        <!-- Navbar content will be injected by JS -->
    </nav>

    <!-- Core JavaScript -->
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <!-- Page-specific script (can be added for complex pages) -->
    <!-- <script src="js/home.js"></script> -->

</body>
</html>
