<!DOCTYPE html>
<html>
<head><title>FFmpeg Test</title></head>
<body>
    <h1>FFmpeg Load Test</h1>
    <div id="log"></div>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.0/dist/ffmpeg.min.js"></script>
    <script>
        const { createFFmpeg } = FFmpeg;
        const logElement = document.getElementById('log');
        async function run() {
            logElement.textContent = 'Loading FFmpeg...\n';
            try {
                const ffmpeg = createFFmpeg({
                    // Try different core paths here:
                    corePath: 'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js',
                    // corePath: 'https://unpkg.com/@ffmpeg/core-st@0.11.0/dist/ffmpeg-core.js', // if exists
                    // corePath: 'https://unpkg.com/@ffmpeg/core@0.10.0/dist/ffmpeg-core.js',
                    log: true,
                });
                await ffmpeg.load();
                logElement.textContent += 'FFmpeg loaded successfully!\n';
                logElement.textContent += `isLoaded: ${ffmpeg.isLoaded()}\n`;
            } catch (e) {
                logElement.textContent += `Error: ${e.message}\n${e.stack}\n`;
                console.error(e);
            }
        }
        run();
    </script>
</body>
</html>
