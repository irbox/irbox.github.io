<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Material Blog</title>
  <!-- Google Fonts -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap">
  <!-- Material Design Lite -->
  <link rel="stylesheet" href="https://code.getmdl.io/1.3.0/material.indigo-pink.min.css">
  <script defer src="https://code.getmdl.io/1.3.0/material.min.js"></script>
  <!-- Inline CSS -->
  <style>
    body {
      font-family: 'Roboto', sans-serif;
    }

    .mdl-layout__header {
      background-color: #3f51b5; /* Primary color */
    }

    .mdl-navigation__link {
      color: white;
    }

    .mdl-card {
      margin: 20px;
      padding: 20px;
    }
  </style>
</head>
<body>
  <div class="mdl-layout mdl-js-layout mdl-layout--fixed-header">
    <header class="mdl-layout__header">
      <div class="mdl-layout__header-row">
        <span class="mdl-layout-title">My Material Blog</span>
        <div class="mdl-layout-spacer"></div>
        <nav class="mdl-navigation">
          <a class="mdl-navigation__link" href="/">Home</a>
          <a class="mdl-navigation__link" href="/about">About</a>
        </nav>
      </div>
    </header>
    <main class="mdl-layout__content">
      <div class="page-content">
        <article class="mdl-card mdl-shadow--2dp">
          <header class="mdl-card__title">
            <h1 class="mdl-card__title-text">Welcome to My Material Blog!</h1>
          </header>
          <div class="mdl-card__supporting-text">
            <p>This is a simple static blog using Material Design 3 principles.</p>
            <p>You can add more posts and customize the styles as needed.</p>
          </div>
        </article>
      </div>
    </main>
  </div>
  <!-- Inline JavaScript -->
  <script>
    // Add any custom JavaScript here
  </script>
</body>
</html>
