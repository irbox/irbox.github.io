<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client-Side Video Merger</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Video Merger (Client-Side)</h1>

        <div class="upload-section">
            <label for="videoFiles" class="file-label">Select Videos to Merge (MP4 recommended):</label>
            <input type="file" id="videoFiles" accept="video/mp4,video/*" multiple>
            <p class="small-text">Note: For best results and speed, use videos with similar codecs and resolutions.</p>
            <p class="small-text">Large files may take a long time and consume significant memory.</p>
        </div>

        <div class="file-list-section">
            <h2>Selected Files (Drag to reorder):</h2>
            <ul id="selectedFileList">
                <!-- Selected files will be listed here -->
            </ul>
            <button id="clearFiles" class="btn btn-secondary" disabled>Clear Files</button>
        </div>

        <div class="merge-section">
            <button id="mergeButton" class="btn btn-primary" disabled>Merge Videos</button>
        </div>

        <div class="progress-section">
            <h2>Progress:</h2>
            <progress id="progressBar" value="0" max="100" style="display:none;"></progress>
            <div id="logOutput"></div>
        </div>

        <div class="download-section" style="display:none;">
            <h2>Merged Video:</h2>
            <a id="downloadLink" class="btn btn-success">Download Merged Video</a>
            <video id="mergedVideoPreview" controls style="width:100%; max-width:500px; margin-top:10px; display:none;"></video>
        </div>
    </div>

    <!-- FFmpeg.wasm library (version 0.11.0) -->
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.0/dist/ffmpeg.min.js"></script>
    <!-- Your application script -->
    <script src="script.js"></script>
</body>
</html>
