<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course PWA App</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }
        #login-button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #4285f4;
            color: white;
        }
        #content {
            display: none;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }
        #course-list {
            list-style-type: none;
            padding: 0;
        }
        #course-list li {
            margin: 10px 0;
        }
        #course-list a {
            text-decoration: none;
            color: #4285f4;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <button id="login-button">Login with Google</button>
    <div id="content">
        <h1>Courses</h1>
        <ul id="course-list"></ul>
    </div>

    <script>
        const CLIENT_ID = 'YOUR_GOOGLE_CLIENT_ID';
        const API_KEY = 'YOUR_GOOGLE_API_KEY';
        const DISCOVERY_DOCS = ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"];
        const SCOPES = 'https://www.googleapis.com/auth/drive.readonly';

        function handleClientLoad() {
            gapi.load('client:auth2', initClient);
        }

        function initClient() {
            gapi.client.init({
                apiKey: API_KEY,
                clientId: CLIENT_ID,
                discoveryDocs: DISCOVERY_DOCS,
                scope: SCOPES
            }).then(() => {
                gapi.auth2.getAuthInstance().isSignedIn.listen(updateSigninStatus);
                updateSigninStatus(gapi.auth2.getAuthInstance().isSignedIn.get());
                document.getElementById('login-button').onclick = handleAuthClick;
            });
        }

        function updateSigninStatus(isSignedIn) {
            if (isSignedIn) {
                document.getElementById('login-button').style.display = 'none';
                document.getElementById('content').style.display = 'flex';
                listFiles();
            } else {
                document.getElementById('login-button').style.display = 'block';
                document.getElementById('content').style.display = 'none';
            }
        }

        function handleAuthClick(event) {
            gapi.auth2.getAuthInstance().signIn();
        }

        function listFiles() {
            gapi.client.drive.files.list({
                'q': "mimeType='application/pdf' or mimeType='video/mp4'",
                'pageSize': 10,
                'fields': "nextPageToken, files(id, name)"
            }).then(response => {
                const files = response.result.files;
                const fileContainer = document.getElementById('course-list');
                fileContainer.innerHTML = '';
                if (files && files.length > 0) {
                    files.forEach((file) => {
                        const listItem = document.createElement('li');
                        const fileLink = document.createElement('a');
                        fileLink.href = `https://drive.google.com/file/d/${file.id}/view`;
                        fileLink.textContent = file.name;
                        fileLink.target = '_blank';
                        listItem.appendChild(fileLink);
                        fileContainer.appendChild(listItem);
                    });
                } else {
                    fileContainer.innerHTML = '<li>No files found.</li>';
                }
            });
        }

        window.onload = handleClientLoad;
    </script>
    <script async defer src="https://apis.google.com/js/api.js" onload="this.onload=function(){};handleClientLoad()" onreadystatechange="if (this.readyState === 'complete') this.onload()">
    </script>
</body>
</html>
