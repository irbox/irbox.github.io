<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veducation - Shopping Cart</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=typography,line-clamp"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/custom.css">
    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" />
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style type="text/tailwindcss">
        /* Include base styles needed for cart page */
        body {
            @apply min-h-screen bg-background font-sans text-lg text-neutral-600 pb-[6rem];
        }
        /* Add other base styles if needed */

        /* Potentially add styles converted from cart-specific CSS modules if needed */
        /* .cart-item { @apply ...; } */
      </style>
</head>
<body class="bg-background text-neutral-600 font-sans">

    <!-- Header -->
    <header id="main-header" class="sticky top-0 z-20 bg-background p-2 flex justify-between items-center shadow-md">
        <!-- Header content will be injected by JS -->
        <p>Loading Header...</p>
    </header>

    <!-- Main Content Area -->
    <!-- The loadCartPageContent function in app.js will populate this -->
    <main id="main-content" class="container mx-auto py-6">
         <div class="px-container md:px-0"> <!-- Add padding for mobile -->
             <h1 class="text-2xl font-bold mb-6">Shopping Cart</h1>
             <div id="cart-items-container" class="mb-6">
                 <!-- Cart items will be rendered here by js/app.js -> renderCartPageContent() -->
                  <p class="text-center p-10">Loading Cart Items...</p>
             </div>
             <div id="cart-summary-container">
                 <!-- Cart summary and checkout button will be rendered here -->
                  <p class="text-center p-5">Loading Summary...</p>
             </div>
         </div>
    </main>

    <!-- Footer / Navbar -->
    <nav id="main-navbar" class="fixed bottom-0 left-0 w-full bg-background shadow-inner z-10 border-t border-gray-200">
        <!-- Navbar content will be injected by JS -->
         <p class="text-center text-xs p-2">Loading Navigation...</p>
    </nav>

    <!-- Core JavaScript -->
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <!-- No page-specific script needed here, app.js handles cart logic -->

</body>
</html>
